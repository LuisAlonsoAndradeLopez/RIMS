<h1 class="text-2xl font-bold mb-4">
  Angular MSAL Client
</h1>

<!-- Show user email -->
@if (userEmail) {
<div class="mb-4 text-green-600">
  Logged user: {{ userEmail }}
</div>
}


<div class="flex flex-col gap-2 p-3">

  <button class="px-4 py-2 w-[20%] bg-blue-600 text-white rounded" (click)="login()">
    Login with Microsoft
  </button>

  <button class="px-4 py-2 w-[20%] bg-green-600 text-white rounded" (click)="callApi()">
    Call Secure API
  </button>

  <button class="px-4 py-2 w-[20%] bg-gray-600 text-white rounded" (click)="logout()">
    Logout
  </button>

</div>
